<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Free Roof Inspection — U.S. Shingle &amp; Metal</title>
    <meta name="description" content="Free roof inspection by U.S. Shingle &amp; Metal. Tap your link to sign up — our licensed inspector visits, documents any storm damage, and forwards findings to a Public Adjuster if needed." />

    <!-- Open Graph (Facebook, iMessage, LinkedIn, most chat apps) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://free-roof-inspections.netlify.app/" />
    <meta property="og:title" content="Free Roof Inspection — U.S. Shingle &amp; Metal" />
    <meta property="og:description" content="Free roof inspection by U.S. Shingle &amp; Metal. Sign up online — licensed inspector, full report, no obligation." />
    <meta property="og:image" content="https://free-roof-inspections.netlify.app/uss-header.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Free Roof Inspection — U.S. Shingle &amp; Metal" />
    <meta name="twitter:description" content="Free roof inspection — licensed inspector, full report, no obligation." />
    <meta name="twitter:image" content="https://free-roof-inspections.netlify.app/uss-header.png" />

    <link rel="icon" href="/uss-header.png" type="image/png" />

    <!-- Installable app (PWA): home-screen icon on phone + desktop -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#13294b" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="U.S. Shingle" />

    <!-- Launched from the installed icon → jump straight to this user's saved
         link (their token), so reps land on their own tools already signed in.
         Runs before React to avoid a flash of the homeowner page. -->
    <script>
      (function () {
        try {
          var params = new URLSearchParams(location.search);
          // On the harvest MAP, point the page at the map's OWN manifest AS EARLY AS
          // POSSIBLE (before the phone reads it at "Add to Home Screen" time) and stash
          // the map's home. Done here in the <head> — not in the JS bundle, which loads
          // too late for the phone to see the swap.
          if (params.get("mode") === "harvest") {
            var ml = document.querySelector('link[rel="manifest"]');
            if (ml) ml.setAttribute("href", "/manifest-harvest.webmanifest");
            // DoorDispatcher branding on the map: swap the browser-tab favicon to
            // the Doorpin (the rest of the app keeps the U.S. Shingle icon).
            var fav = document.querySelector('link[rel="icon"]');
            if (fav) { fav.setAttribute("href", "/doordispatcher-icon.svg"); fav.setAttribute("type", "image/svg+xml"); }
            if (params.get("rt") || params.get("admin") || params.get("manager")) {
              localStorage.setItem("harvest_home", location.href);
            }
          }
          var standalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
          var launched = standalone || params.get("app") === "1";
          // The MAP icon (separate manifest) launches with go=harvest → ALWAYS open the
          // map, never the Field Visit home. Falls back to the map URL if no saved home.
          if (launched && params.get("go") === "harvest") {
            location.replace(localStorage.getItem("harvest_home") || "/?mode=harvest");
            return;
          }
          var home = localStorage.getItem("pwa_home");
          // Only redirect a PLAIN icon launch (no destination params). ANY param —
          // intake, crew, a signing token, etc. — means the user is intentionally
          // going somewhere, so we must NOT hijack it back to their saved home.
          // (This is what sent reps' "Sign Inspection" tab back to the map.)
          var keys = [];
          params.forEach(function (v, k) { if (k !== "app" && k !== "go") keys.push(k); });
          var bare = location.pathname === "/" && keys.length === 0;
          if (launched && home && bare) location.replace(home);
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
