[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sharp"]

# Scheduled function: pushes any inspector-classified results that
# haven't reached JN yet. Runs hourly at :05. The function file also
# declares this via exports.config.schedule; this toml entry keeps
# the cadence visible from project root.
[functions."cron-push-pending-results"]
  schedule = "5 * * * *"

# Scheduled function: daily safety net for JN sync orphans. Once a day
# checks the last 24h of signings for any that never reached JN, and
# texts ADMIN_ALERT_PHONE the list so they can be re-synced. Quiet when
# there are no orphans.
[functions."daily-orphan-alert"]
  schedule = "0 12 * * *"

# Scheduled function: AUTO-HEAL JobNimbus orphans every 15 min. Finds signed,
# not-cancelled inspections with no jn_job_id (any result) and re-runs the JN
# sync (retry-jn-sync) so they land in JN for payroll/reporting without anyone
# pressing "Sync to JN". Texts ADMIN_ALERT_PHONE only about ones it still
# couldn't sync. Pause via auto_sms 'orphan_autosync'. exports.config mirrors.
[functions."cron-sync-orphans"]
  schedule = "*/15 * * * *"

# Scheduled function: bi-directional JN ↔ Supabase sync. Runs every 15
# minutes. Brings inspection results (Damage / No Damage / Retail) from
# JN into the app + fires rep notifications, AND brings JN "Lost" status
# changes back as cancelled_at on inspections (so the roof drops out of
# the inspector mobile app's "Available near me" pool without anyone
# having to open the admin app first). The function file also declares
# this via exports.config.schedule; this toml entry keeps the cadence
# visible from project root.
[functions."inspection-checker"]
  schedule = "*/15 * * * *"

# Scheduled function: hourly safety net for cert PDFs that should have
# been uploaded to JN but weren't. The normal flow fires the cert via a
# background function the moment the inspector hits submit; once in a
# while that drops on the floor (PDFShift / JN file upload hiccup).
# This cron finds those orphaned certs and re-fires the generator, so
# nobody has to manually spot + re-fire. Runs at :20 to stagger from
# the other crons. Silent on clean hours.
[functions."cron-retry-missing-certs"]
  schedule = "20 * * * *"

# Scheduled function: leaderboard hype texts. Every 5 minutes it checks
# the weekly team standings (via zone-leaderboard) and, when a NEW team
# takes strict 1st place, texts all active sales reps + regional
# managers a "<team> just took 1st place" message so the field feels the
# race move. Last leader is remembered in Netlify Blobs; silent unless
# the lead actually changes hands. The SMS fan-out runs in the separate
# leaderboard-blast-background function. The function file also declares
# this via exports.config.schedule; this toml entry keeps it visible.
[functions."leaderboard-notify"]
  schedule = "*/5 * * * *"

# cron-daily-leaderboard: a once-a-day MORNING SNAPSHOT of the team
# standings (unlike leaderboard-notify, which only fires when the lead
# changes hands). Fires at 13:00 UTC = 9 AM EDT and texts the whole field
# "Starting <day>, <team> is in the lead with N…" plus any extra copy-
# recipients configured in the auto_sms table. The function file also
# declares this via exports.config.schedule; this toml entry keeps it
# visible.
[functions."cron-daily-leaderboard"]
  schedule = "0 13 * * *"

# Scheduled function: auto-assign damage deals to Public Adjusters every 5
# minutes (replaces PA self-claiming). Least-loaded round-robin across
# active PAs; with one PA everything goes to him. Pause via the auto_sms
# row key 'pa_auto_assign' (enabled=false). The function file also declares
# this via exports.config.schedule; this toml entry keeps it visible.
[functions."cron-assign-pas"]
  schedule = "*/5 * * * *"

# Scheduled function: morning "sales inventory" audit. At 7 AM EDT (11:00
# UTC) it scans every JobNimbus job SOLD yesterday against the rep checklist
# (required fields + conditional rules) and texts reps what they missed/got
# wrong, managers a zone roll-up, and ADMIN_ALERT_PHONE a full summary.
# Sending is gated by auto_sms keys 'sales_audit' (master) + rep texts by
# 'sales_audit_text_reps' (soft-launch off). Manual dry run: GET the
# function with ?dry=1[&date=YYYY-MM-DD]. The file also declares this via
# exports.config.schedule; this toml entry keeps the cadence visible.
[functions."cron-sales-audit"]
  schedule = "0 11 * * *"

# Scheduled function: daily nudge to PA COMPANY admins about homeowners in
# their pool that have sat 48h+ without being opened/touched (assigned or
# not). Texts each company's admin the list; quiet when a company is current.
# Pause via auto_sms key 'pa_stale_alert'. 8 AM EDT. exports.config mirrors.
[functions."cron-pa-company-stale"]
  schedule = "0 12 * * *"
