[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sharp"]

# Scheduled function: pushes any inspector-classified results that
# haven't reached JN yet. Runs hourly at :05. The function file also
# declares this via exports.config.schedule; this toml entry keeps
# the cadence visible from project root.
[functions."cron-push-pending-results"]
  schedule = "5 * * * *"

# Scheduled function: daily safety net for JN sync orphans. Once a day
# checks the last 24h of signings for any that never reached JN, and
# texts ADMIN_ALERT_PHONE the list so they can be re-synced. Quiet when
# there are no orphans.
[functions."daily-orphan-alert"]
  schedule = "0 12 * * *"
