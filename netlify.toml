[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sharp"]

# Scheduled function: extracts roof PITCH from each sold deal's Roofr PDF
# (the ratio isn't a JN field) into the roof_pitch table for the Appt→Sales
# report. Runs nightly 4:30 AM ET; incremental + throttle-gentle.
[functions."cron-extract-pitch"]
  schedule = "30 8 * * *"

# Scheduled function: sync JobNimbus installs into the Install Finder's Supabase
# (separate project) so the map stays current. Nightly ~3:30 AM ET; add-only,
# dedups by jnid + address, never touches hand-imported rows.
[functions."cron-sync-installs"]
  schedule = "30 7 * * *"

# Scheduled function: pull "No Sit- Need to Reschedule" deals from JobNimbus onto
# the Harvesting Map (geocodes a bounded batch/run, reconciles re-booked ones
# away). Twice daily. Also declares this via exports.config.schedule.
[functions."harvest-sync-nosits"]
  schedule = "40 7,15 * * *"

# Scheduled function: WEEKLY push of NEW installs into RepCard as "Installed" map
# pins (so canvassing reps see "we installed your neighbor"). Dedups on our side
# via installs.repcard_pushed_at (RepCard's API can't dedup/delete). Monday ~4 AM
# ET. One-time setup: ALTER TABLE installs ADD COLUMN repcard_pushed_at + GET
# ?seed=1. exports.config mirrors this.
[functions."cron-sync-repcard-pins"]
  schedule = "0 8 * * 1"

# Scheduled function: pushes any inspector-classified results that
# haven't reached JN yet. Runs hourly at :05. The function file also
# declares this via exports.config.schedule; this toml entry keeps
# the cadence visible from project root.
[functions."cron-push-pending-results"]
  schedule = "5 * * * *"

# Scheduled function: track back-to-retail CONVERSIONS. Hourly snapshot of which
# retail deals are at "Sit Sold Insp" vs have moved off it; logs each transition
# (esp. → "Appointment Scheduled") into retail_status_tracking so the regional
# dashboard can credit reps for re-engaging back-to-retail leads. The function
# also declares this via exports.config.schedule; this entry keeps it visible.
[functions."cron-track-retail-status"]
  schedule = "0 * * * *"

# Scheduled function: reads JN status of active retail deals and stamps
# inspections.retail_outcome (sold / no_sale / ni) when they reach a terminal
# status — which drops them off the rep's Retail visit list (row kept for
# reporting). Catches outcomes set on the JobNimbus/office side. Hourly, offset.
[functions."cron-sync-retail-status"]
  schedule = "15 * * * *"

# Scheduled function: daily reconcile of JN "Sit Sold Insp" (needs-inspection)
# vs our app. Auto-heals jobs we've finished but whose JN result/status never
# updated (re-pushes; lost → Lost+note), and texts ADMIN_ALERT_PHONE the ones
# with no inspection record (dupes/JN-only). exports.config mirrors this.
[functions."cron-sitsold-reconcile"]
  schedule = "0 13 * * *"

# Scheduled function: daily safety net for JN sync orphans. Once a day
# checks the last 24h of signings for any that never reached JN, and
# texts ADMIN_ALERT_PHONE the list so they can be re-synced. Quiet when
# there are no orphans.
[functions."daily-orphan-alert"]
  schedule = "0 12 * * *"

# Scheduled function: weekly manager-pay invoice check. Wednesday morning
# emails payroll (Sam) the prior week's SOLD deals that still have no invoice
# in JobNimbus — manager override pays on the total invoiced amount, so those
# can't be calculated until an invoice is built. Fires 13:00 & 14:00 UTC; the
# in-function ET-hour gate keeps only 9 AM ET (one email/Wed year-round).
# exports.config mirrors this cadence.
[functions."cron-missing-invoice-alert"]
  schedule = "0 13,14 * * 3"

# Scheduled function: end-of-day ET inspector accountability. Auto-releases
# stale inspector claims (claimed >2h ago, still no result) back to the
# "Available near me" pool, then texts MANAGER_ALERT_PHONE ONE report listing
# who sat on claims (with addresses) + which active inspectors claimed nothing
# today. Silent on quiet days. Runs 6 PM EDT (22:00 UTC). NOTE: do not set
# CRON_SECRET — the scheduled invocation carries no secret and would be 401'd.
[functions."check-stale-claims"]
  schedule = "0 22 * * *"

# Scheduled function: 1-hour PA appointment follow-up. Every 15 min, texts +
# emails the adjuster a deep-link (?mode=pa&pa=…&job=…) that opens their portal
# right on the homeowner they just visited, where the "How did the appointment
# go?" card captures the outcome (Signed / Refused / Not home / Cancelled).
# Fires once per appointment, 60–75 min after its start. Requires the
# pa_appointments.followup_sent_at column. exports.config mirrors this.
[functions."cron-pa-appt-followup"]
  schedule = "*/15 * * * *"

# Scheduled function: AUTO-HEAL JobNimbus orphans every 15 min. Finds signed,
# not-cancelled inspections with no jn_job_id (any result) and re-runs the JN
# sync (retry-jn-sync) so they land in JN for payroll/reporting without anyone
# pressing "Sync to JN". Texts ADMIN_ALERT_PHONE only about ones it still
# couldn't sync. Pause via auto_sms 'orphan_autosync'. exports.config mirrors.
[functions."cron-sync-orphans"]
  schedule = "*/15 * * * *"

# Scheduled function: bi-directional JN ↔ Supabase sync. Runs every 15
# minutes. Brings inspection results (Damage / No Damage / Retail) from
# JN into the app + fires rep notifications, AND brings JN "Lost" status
# changes back as cancelled_at on inspections (so the roof drops out of
# the inspector mobile app's "Available near me" pool without anyone
# having to open the admin app first). The function file also declares
# this via exports.config.schedule; this toml entry keeps the cadence
# visible from project root.
[functions."inspection-checker"]
  schedule = "*/15 * * * *"

# Scheduled function: reliable "JN Lost -> off inspector list" reconcile. Every
# 5 min it reads OUR active inspection list and checks each one's live JN
# status, cancelling any now marked Lost. Backs up inspection-checker (whose
# JN-sweep + record_type filter can miss a cancellation) and shrinks the
# detection lag to <=5 min. exports.config mirrors this. Manual dry run: GET;
# GET ?apply=1 to cancel on demand.
[functions."reconcile-inspection-cancels"]
  schedule = "*/5 * * * *"

# Scheduled function: hourly safety net for cert PDFs that should have
# been uploaded to JN but weren't. The normal flow fires the cert via a
# background function the moment the inspector hits submit; once in a
# while that drops on the floor (PDFShift / JN file upload hiccup).
# This cron finds those orphaned certs and re-fires the generator, so
# nobody has to manually spot + re-fire. Runs at :20 to stagger from
# the other crons. Silent on clean hours.
[functions."cron-retry-missing-certs"]
  schedule = "20 * * * *"

# Scheduled function: self-healing safety net for the signed AGREEMENT PDF —
# the one doc that can't be regenerated (the homeowner's signature lives only
# inside it). The signing flow now stores the signed bytes on the inspection
# row (pending_pdf_b64) at insert time, so a signed record can never exist
# without its PDF. This cron pushes those bytes to their durable homes: the
# Storage archive (recoverable forever) + the JobNimbus job's Documents tab
# (the gap that stranded Mchenry / Williams — job existed, doc upload had
# silently failed, nothing re-tried it). Clears the row once safe. Every 15
# min; exports.config.schedule mirrors this. No-op on clean runs.
[functions."cron-heal-signed-pdfs"]
  schedule = "*/15 * * * *"

# cron-reconcile-jn-photos: daily safety net for the inspector-app photo gap.
# Inspector photos upload one-by-one from the phone; if the app closes early
# some never reach JN's Photos tab. This walks recent inspections, compares
# app vs JN photo counts, and re-pushes any missing (deduped by filename).
# exports.config.schedule mirrors this. Runs 4 AM ET, quiet on clean days.
[functions."cron-reconcile-jn-photos"]
  schedule = "10 8 * * *"

# Scheduled function: leaderboard hype texts. Every 5 minutes it checks
# the weekly team standings (via zone-leaderboard) and, when a NEW team
# takes strict 1st place, texts all active sales reps + regional
# managers a "<team> just took 1st place" message so the field feels the
# race move. Last leader is remembered in Netlify Blobs; silent unless
# the lead actually changes hands. The SMS fan-out runs in the separate
# leaderboard-blast-background function. The function file also declares
# this via exports.config.schedule; this toml entry keeps it visible.
[functions."leaderboard-notify"]
  schedule = "*/5 * * * *"

# cron-daily-leaderboard: a once-a-day MORNING SNAPSHOT of the team
# standings (unlike leaderboard-notify, which only fires when the lead
# changes hands). Fires at 13:00 UTC = 9 AM EDT and texts the whole field
# "Starting <day>, <team> is in the lead with N…" plus any extra copy-
# recipients configured in the auto_sms table. The function file also
# declares this via exports.config.schedule; this toml entry keeps it
# visible.
[functions."cron-daily-leaderboard"]
  schedule = "0 13 * * *"

# cron-weekly-recap: MONDAY 9 AM EDT (13:00 UTC, Mon only) hype blast recapping
# LAST week's final standings for BOTH boards (signed + sold). Monday is ideal —
# the boards just reset to 0, so the daily snapshot skips Monday and this takes
# its slot. On/off + extra recipients via the auto_sms row 'weekly_recap'.
# exports.config.schedule mirrors this.
[functions."cron-weekly-recap"]
  schedule = "0 13 * * 1"

# Scheduled function: next-morning ride-along confirmation texts. Each rep
# William logged as training with him YESTERDAY gets a link to confirm their
# hours (/?ridealong=<token>). Runs at 13:00 & 14:00 UTC to hit 9:30 AM ET in
# both EDT and EST; the function guards to ET hour 9 so it fires once a day.
# exports.config.schedule mirrors this.
[functions."cron-training-confirm"]
  schedule = "30 13,14 * * *"

# Scheduled function: auto-assign damage deals to Public Adjusters every 5
# minutes (replaces PA self-claiming). Least-loaded round-robin across
# active PAs; with one PA everything goes to him. Pause via the auto_sms
# row key 'pa_auto_assign' (enabled=false). The function file also declares
# this via exports.config.schedule; this toml entry keeps it visible.
[functions."cron-assign-pas"]
  schedule = "*/5 * * * *"

# Scheduled function: "sales inventory" audit. At NOON EDT (16:00 UTC) it
# scans every JobNimbus job SOLD yesterday against the rep checklist and
# texts the REGIONAL MANAGER the per-deal detail of what's missing/wrong
# (reps are NOT texted), plus ADMIN_ALERT_PHONE + any extra recipients on the
# auto_sms 'sales_audit' row a roll-up summary. Gated by auto_sms key
# 'sales_audit'. Manual dry run: GET ?dry=1[&date=YYYY-MM-DD]. The file also
# declares this via exports.config.schedule; this toml keeps it visible.
[functions."cron-sales-audit"]
  schedule = "0 16 * * *"

# Scheduled function: daily nudge to PA COMPANY admins about homeowners in
# their pool that have sat 48h+ without being opened/touched (assigned or
# not). Texts each company's admin the list; quiet when a company is current.
# Pause via auto_sms key 'pa_stale_alert'. 8 AM EDT. exports.config mirrors.
[functions."cron-pa-company-stale"]
  schedule = "0 12 * * *"

# Scheduled function: auto-run the harvest lead sync so NEW JobNimbus leads
# (Instant Quote / Facebook / AI Bot) land on the Harvesting Map same-day
# instead of only when someone manually clicks "sync". Every 2 hours ~7 AM–9 PM
# ET. Thin wrapper — fires the -background sync and returns. The file also
# declares this via exports.config.schedule; this toml entry keeps it visible.
[functions."cron-harvest-leadsync"]
  schedule = "0 11,13,15,17,19,21,23,1 * * *"
